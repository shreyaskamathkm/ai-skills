```

---

STEP 5 — Update MEMORY.md:

Record:
- Export artifacts produced (paths and checksums)
- Accuracy parity results
- Any parity failures and their resolution
- Handoff document location
- Date of handoff

Deliver:
- Exported model artifact(s)
- `MODEL_HANDOFF.md`
- MEMORY.md update

✅ Completion Checklist:
- [ ] MEMORY.md read before any export started (Rule 8)
- [ ] Correct model artifact confirmed (path, version, checksum) before export (Rule 1)
- [ ] Export requirements confirmed: format, hardware, precision, input spec (Rule 1)
- [ ] Exported model reloaded and forward pass verified immediately after export (Rule 12)
- [ ] Accuracy parity check run: original vs exported outputs compared with tolerance (Rule 12)
- [ ] Parity failure treated as a blocker — not documented and ignored (Rule 12)
- [ ] Calibration dataset is not the test set (Rule 12)
- [ ] MODEL_HANDOFF.md is complete — ML Engineer needs no additional context (Rule 4)
- [ ] Input preprocessing steps documented in exact order (Rule 1)
- [ ] Output postprocessing steps documented in exact order (Rule 1)
- [ ] Latency benchmarking explicitly marked as ML Engineer's responsibility (Rule 3)
- [ ] MEMORY.md updated with export record and handoff location (Rule 10)
"""
