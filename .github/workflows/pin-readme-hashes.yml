name: Pin README links to commit hash

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/workflows/**"

permissions:
  contents: write

jobs:
  pin-hashes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Get current commit SHA
        id: sha
        run: echo "hash=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # Use # as the perl delimiter (not | or /) so that forward slashes
      # inside $REPO don't break the regex or the replacement string.
      - name: Pin /blob/main/ and /tree/main/ links
        env:
          HASH: ${{ steps.sha.outputs.hash }}
          REPO: shreyaskamathkm/ai-skills
        run: |
          PATTERN="github\.com/${REPO}/(blob|tree)/([0-9a-f]{40}|main)/"
          REPLACE="github.com/${REPO}/\$1/${HASH}/"

          for file in README.md instructions.md; do
            [ -f "$file" ] || continue
            perl -i -pe "s#${PATTERN}#${REPLACE}#g" "$file"
            echo "Processed $file"
          done

      - name: Pin raw.githubusercontent.com links
        env:
          HASH: ${{ steps.sha.outputs.hash }}
          REPO: shreyaskamathkm/ai-skills
        run: |
          PATTERN="raw\.githubusercontent\.com/${REPO}/([0-9a-f]{40}|main)/"
          REPLACE="raw.githubusercontent.com/${REPO}/${HASH}/"

          for file in README.md instructions.md; do
            [ -f "$file" ] || continue
            perl -i -pe "s#${PATTERN}#${REPLACE}#g" "$file"
            echo "Processed $file"
          done

      - name: Commit pinned links
        env:
          HASH: ${{ steps.sha.outputs.hash }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git diff --quiet && echo "No changes to commit." && exit 0

          git add README.md instructions.md
          git commit -m "chore: pin README links to ${HASH:0:7} [skip ci]"
          git push